<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dictionary Web App</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="./Dictionary.css" />
  </head>
  <body>
    <div id="Container">
      <header>
        <h1>Lexicon<span>.</span></h1>
        <p>Advanced Word Engine</p>
      </header>

      <div id="search-box">
        <div class="input-wrapper">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="inputt" placeholder="Search any word..." />
        </div>
        <button id="btn">Search</button>
      </div>

      <div id="result">
        <div class="placeholder-text">
          <i class="fa-solid fa-book-open"></i>
          <p>Type a word above to explore its meaning.</p>
        </div>
      </div>
    </div>
    <script src="./Dictionary.js"></script>
  </body>
</html>
